<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/0a8e3f0d41.js"
      crossorigin="anonymous"
    ></script>
    <title>Spotfy</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="container">
      <nav class="sidebar">
        <div class="nav-logo">
          <i class="fa-brands fa-spotify"></i>
        </div>
        <div class="nav-libary">
          <i class="fa-solid fa-book"></i>
          <p>Sua Biblioteca</p>
        </div>
        <div class="nav-playlist">
          <h5>Crie sua Primeira PlayList</h5>
          <p>E facil, vamos te ajudar</p>
          <button>Criar PLayList</button>
        </div>
        <div class="nav-podcast">
          <h5>Que tal Seguir um Podcast</h5>
          <p>Avisaremos voce sobre nossos episodios</p>
          <button>Explore Podcasts</button>
        </div>
        <div class="nav-footer">
          <a href="#">Legal</a>
          <a href="#">Centro de Privacidade</a>
          <a href="#">Politica de Privacidade</a>
          <a href="#">Cookies</a>
          <a href="#">Sobre anuncios</a>
          <a href="#">Acessibilidades</a>
        </div>
        <button class="nav-lang-button">
          <i class="fa-solid fa-globe"></i>
          Portugues do Brasil
        </button>
      </nav>
      <main>
        <header class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="O que voce quer ouvir?">
        </header>
        <section class="content">
            <h2>Artistas Populares</h2>
            <div class="artists-grid">
                <!--inserir dados JS-->
            </div>


            <h2>Albuns Populares</h2>
            <div class="albums-grid">
                 <!--inserir dados JS-->
            </div>
        </section>
      </main>
    </div>
  </body>
</html>
